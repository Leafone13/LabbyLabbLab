<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVL Meetings Formatter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --yellow: #FFE600;
    --gray-100: #f4f4f4;
    --gray-200: #e8e8e8;
    --gray-400: #999;
    --gray-600: #555;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--gray-100);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--black);
    color: var(--white);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  header span {
    font-size: 11px;
    color: var(--gray-400);
    letter-spacing: 0.05em;
  }

  /* ── LAYOUT ── */
  .workspace {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    flex: 1;
    height: calc(100vh - 57px);
  }

  /* ── LEFT PANEL ── */
  .input-panel {
    background: var(--white);
    border-right: 1px solid var(--gray-200);
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 16px;
  }

  .panel-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray-400);
  }

  .entries-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    overflow-y: auto;
  }

  .entry-block {
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .entry-header {
    background: var(--gray-100);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--gray-600);
    letter-spacing: 0.04em;
  }

  .entry-header button {
    background: none;
    border: none;
    cursor: pointer;
    color: #cc3300;
    font-size: 13px;
    line-height: 1;
    padding: 0 2px;
    font-family: inherit;
  }

  textarea {
    width: 100%;
    height: 140px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
    padding: 10px 12px;
    border: none;
    background: var(--white);
    color: var(--black);
    resize: none;
    outline: none;
    display: block;
  }

  textarea::placeholder { color: var(--gray-400); }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 9px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    border: none;
    letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.8; }
  .btn-add {
    background: var(--black);
    color: var(--white);
  }
  .btn-generate {
    background: var(--yellow);
    color: var(--black);
    font-weight: 500;
  }
  .btn-clear {
    background: var(--gray-200);
    color: var(--gray-600);
    margin-left: auto;
  }

  /* ── RIGHT PANEL ── */
  .output-panel {
    background: var(--white);
    display: flex;
    flex-direction: column;
  }

  .output-toolbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .btn-print {
    background: var(--black);
    color: var(--white);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 8px 20px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  .btn-print:hover { opacity: 0.8; }

  .output-preview {
    flex: 1;
    overflow-y: auto;
    padding: 40px 32px;
  }

  /* ── PRINT SHEET ── */
  #sheet {
    max-width: 680px;
    margin: 0 auto;
    font-family: 'IBM Plex Mono', monospace;
  }

  .sheet-title {
    font-family: 'Syne', sans-serif;
    font-size: 38px;
    font-weight: 800;
    text-align: center;
    letter-spacing: -1px;
    margin-bottom: 48px;
  }

  .date-group {
    margin-bottom: 36px;
  }

  .date-heading {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    border-top: 2px solid var(--black);
    border-bottom: 2px solid var(--black);
    padding: 6px 0;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }

  .booking {
    text-align: center;
    font-size: 15px;
    line-height: 1.9;
    font-weight: 500;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px dashed var(--gray-200);
  }
  .booking:last-child { border-bottom: none; }

  .hl { background: var(--yellow); padding: 0 3px; }

  .empty-state {
    color: var(--gray-400);
    font-size: 12px;
    text-align: center;
    margin-top: 60px;
    line-height: 2;
  }

  /* ── PRINT STYLES ── */
  @media print {
    body { background: white; }
    header, .input-panel, .output-toolbar { display: none !important; }
    .workspace { display: block; height: auto; }
    .output-panel { display: block; }
    .output-preview { padding: 20px; overflow: visible; }
    #sheet { max-width: 100%; }
    .booking { page-break-inside: avoid; }
  }
</style>
</head>
<body>

<header>
  <h1>PVL Meetings</h1>
  <span>OFFLINE FORMATTER — PASTE MEWS DATA BELOW</span>
</header>

<div class="workspace">

  <!-- LEFT: Input -->
  <div class="input-panel">
    <div class="panel-label">Reservations — paste one Mews block per entry</div>

    <div class="entries-list" id="entriesList">
      <!-- entries injected here -->
    </div>

    <div class="btn-row">
      <button class="btn btn-add" onclick="addEntry()">+ Add entry</button>
      <button class="btn btn-generate" onclick="generate()">Generate ↗</button>
      <button class="btn btn-clear" onclick="clearAll()">Clear all</button>
    </div>
  </div>

  <!-- RIGHT: Output -->
  <div class="output-panel">
    <div class="output-toolbar">
      <span class="panel-label">Print preview</span>
      <button class="btn-print" onclick="window.print()">Print / Save PDF</button>
    </div>
    <div class="output-preview">
      <div id="sheet">
        <div class="sheet-title">PVL Meetings</div>
        <div class="empty-state">
          Paste Mews reservation data on the left<br>
          and click <strong>Generate</strong> to build the sheet.
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ── STATE ──
let entryCount = 0;

function addEntry(prefill = '') {
  entryCount++;
  const id = 'entry-' + entryCount;
  const list = document.getElementById('entriesList');

  const block = document.createElement('div');
  block.className = 'entry-block';
  block.id = id;
  block.innerHTML = `
    <div class="entry-header">
      <span>Entry ${entryCount}</span>
      <button onclick="removeEntry('${id}')" title="Remove">✕</button>
    </div>
    <textarea placeholder="Paste raw Mews reservation data here…">${prefill}</textarea>
  `;
  list.appendChild(block);
  list.scrollTop = list.scrollHeight;
}

function removeEntry(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function clearAll() {
  document.getElementById('entriesList').innerHTML = '';
  entryCount = 0;
  renderSheet([]);
}

// ── PARSING ──
function parseEntry(raw) {
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const text = lines.join('\n');

  // ── 1. Extract the full note block (everything after "Note (General), ...")
  const noteBlockMatch = text.match(/Note\s*\(General\)[^\n]*\n([\s\S]*)/i);
  const noteBlock = noteBlockMatch ? noteBlockMatch[1] : '';

  // ── 2. Find the group name from the note.
  const junkPatterns = [
    /^[\d]+[\.:]/,
    /^-{3,}/,
    /^->/,                                          // arrow lines like "-> Snack om..."
    /^(zaalopstelling|benodigdheden|programma|gemeentelijke|memo|nb\b|dieetwensen|var\b)/i,
    /allerg/i,
    /geen vlees|no meat|no fish|shellfish|schelpdieren|noten|vegetari/i,
    /^\*/,
    /^\(/,
    /gasten krijgen|welkomst|binnenkomst/i,
    /volwassenen|kinderen|kinderkaart/i,
    /\d+\s*(personen|pax|persen)/i,                // "7 personen", "12 pax" — headcount lines
    /^(lunch|dinner|diner|snack|ontbijt)\s+\d+/i,  // "Lunch 7 personen", "Diner 11 pax"
    /starten met|middag|ochtend|avond|om \d+[\.:]/i,// schedule lines
    /[a-f0-9]{8}-[a-f0-9]{4}-/i,
    /proposales/i,
  ];
  const isJunkLine = l => !l || l.length < 2 || junkPatterns.some(p => p.test(l));
  const looksLikeName = l => {
    if (!l || l.length > 80) return false;
    if (isJunkLine(l)) return false;
    if (/\b(krijgen|van het|bij|worden|volgt|inclusief|excl|boek)\b/i.test(l)) return false;
    return /[A-ZÁÉÍÓÚÀÈÙÄËÏÖÜ]/.test(l);
  };

  let noteGroupName = null;
  if (noteBlock) {
    const noteLines = noteBlock.split('\n').map(l => l.trim());
    let firstCandidate = null;
    for (const l of noteLines) {
      if (looksLikeName(l)) {
        let candidate = l;
        const dashParts = l.split(/\s+-\s+/);
        if (dashParts.length >= 2 && /[a-z]{4,}/.test(dashParts[1])) {
          candidate = dashParts[0].trim();
        }
        candidate = candidate.replace(/\s+\d+\s*(pax|personen|pers).*$/i, '').trim();
        candidate = candidate.replace(/\s*->.*$/, '').trim();
        if (candidate.length > 1) { firstCandidate = candidate; break; }
      }
    }
    let lastCandidate = null;
    for (let i = noteLines.length - 1; i >= 0; i--) {
      if (looksLikeName(noteLines[i])) {
        lastCandidate = noteLines[i];
        break;
      }
    }
    if (lastCandidate && firstCandidate) {
      const lastIsShort = lastCandidate.split(' ').length <= 6;
      noteGroupName = lastIsShort ? lastCandidate : firstCandidate;
    } else {
      noteGroupName = lastCandidate || firstCandidate;
    }
  }

  // ── 3. Fallback: "Group name" field, strip the booking code suffix (e.g. -7-4-1DAB)
  let codeGroupName = '';
  const gnMatch = text.match(/Group name\s*\n([^\n]+)/i);
  if (gnMatch) {
    codeGroupName = gnMatch[1].replace(/-[A-Z0-9]{4,}$/, '').replace(/-\d+-\d+$/, '').trim();
  }

  // ── 4. Final junk check on note name
  const isJunkName = name => !name || isJunkLine(name);

  // ── 5. Companion name fallback
  const companionMatch = text.match(/\*?\s*(?:__)?([A-Z][a-z]+ [A-Z][a-z]+)(?:__)?/);
  const companionName = companionMatch ? companionMatch[1].trim() : null;

  // Also try plain line after "× Adults" block (non-markdown companion format)
  let plainCompanion = null;
  const afterAdults = text.match(/×\s*Adults[\s\S]*?\n([A-Z][a-z]+ [A-Z][a-z]+)/);
  if (afterAdults) plainCompanion = afterAdults[1].trim();

  const guestName = companionName || plainCompanion || null;

  // ── 6. Priority: note last-line (if not junk) > code group name > guest name
  let displayGroup = (!isJunkName(noteGroupName) ? noteGroupName : null)
    || codeGroupName
    || guestName
    || '';

  // ── Arrival date & time
  let date = '';
  let time = '';
  const arrivalMatch = text.match(/Arrival\s*\n([\d\/]+)\s+([\d:]+)/i);
  if (arrivalMatch) {
    const parts = arrivalMatch[1].split('/');
    if (parts.length >= 2) date = parts[0] + '/' + parts[1];
    time = arrivalMatch[2].slice(0,5);
  }

  // ── Meeting room
  let room = '';
  const roomMatch = text.match(/Assigned space\s*\n([^\n]+)/i);
  if (roomMatch) room = roomMatch[1].trim();

  // ── Meals: scan Products + Note for keywords (Dutch + English)
  const meals = [];
  const productLines = text.match(/Products\s*\n([\s\S]*?)(?:\nPayment|\nOrigin|\nCreated|$)/i);
  const productText = (productLines ? productLines[1] : '').toLowerCase();
  const noteText = noteBlock.toLowerCase();
  const searchText = productText + ' ' + noteText;

  if (/breakfast|ontbijt/.test(searchText)) meals.push('Breakfast');
  if (/lunch|lunchpakket|buffet/.test(searchText)) meals.push('Lunch');
  if (/dinner|diner|3-gangen|diner/.test(searchText)) meals.push('Dinner');

  const mealLabel = meals.length > 0 ? meals.join(' & ') : 'Catering';

  return { group: displayGroup, date, time, room, mealLabel };
}

// ── GENERATE ──
function generate() {
  const blocks = document.querySelectorAll('#entriesList .entry-block');
  const bookings = [];

  blocks.forEach(block => {
    const ta = block.querySelector('textarea');
    const raw = ta ? ta.value.trim() : '';
    if (!raw) return;
    const parsed = parseEntry(raw);
    bookings.push(parsed);
  });

  renderSheet(bookings);
}

function renderSheet(bookings) {
  const sheet = document.getElementById('sheet');

  if (!bookings.length) {
    sheet.innerHTML = `
      <div class="sheet-title">PVL Meetings</div>
      <div class="empty-state">
        Paste Mews reservation data on the left<br>
        and click <strong>Generate</strong> to build the sheet.
      </div>`;
    return;
  }

  // Group by date
  const byDate = {};
  bookings.forEach(b => {
    const key = b.date || 'Unknown date';
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push(b);
  });

  // Sort dates
  const sortedDates = Object.keys(byDate).sort((a, b) => {
    const parse = d => { const [dd, mm] = d.split('/'); return mm*100 + (+dd); };
    return parse(a) - parse(b);
  });

  let html = '<div class="sheet-title">PVL Meetings</div>';

  sortedDates.forEach(date => {
    html += `<div class="date-group">`;
    html += `<div class="date-heading">${date}</div>`;
    byDate[date].forEach(b => {
      html += `<div class="booking">
        GROUP: <span class="hl">${esc(b.group)}</span>,<br>
        MEETING ROOM: <span class="hl">${esc(b.room)}</span>, TIME: <span class="hl">${esc(b.time)}</span>,<br>
        ${esc(b.mealLabel)}: <span class="hl">YES</span>
      </div>`;
    });
    html += `</div>`;
  });

  sheet.innerHTML = html;
}

function esc(str) {
  return (str || '—').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init with one empty entry
addEntry();
</script>
</body>
</html>
