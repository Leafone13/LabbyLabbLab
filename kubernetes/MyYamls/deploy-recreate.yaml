apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: testdep
  name: testdep
spec:
  replicas: 10
  selector:
    matchLabels:
      app: testdep
  template:
    metadata:
      labels:
        app: testdep
    spec:
      containers:
      - image: httpd:alpine3.18
        name: httpd
  strategy: 
    type: Recreate 
